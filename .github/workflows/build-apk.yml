name: Build APK

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "last-build.log"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          gradle :app:assembleRelease --stacktrace --info 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Commit build log on failure
        if: failure()
        shell: bash
        run: |
          cp build.log last-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-build.log
          git commit -m "Add latest build log" || exit 0
          git push

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VolumeScheduler-release-apk
          path: app/build/outputs/apk/release/app-release.apk
